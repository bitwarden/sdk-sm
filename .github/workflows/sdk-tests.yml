name: SDK Tests

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test mode (fake-server or real-server)'
        required: false
        default: 'fake-server'
        type: choice
        options:
          - fake-server
          - real-server
      sdk_source:
        description: 'SDK source (local-build or published-package)'
        required: false
        default: 'local-build'
        type: choice
        options:
          - local-build
          - published-package

  push:
    branches:
      - main
      - 'test/**'
    paths:
      - 'languages/python/**'
      - 'languages/go/**'
      - 'tests/**'
      - '.github/workflows/sdk-tests.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'languages/python/**'
      - 'languages/go/**'
      - 'tests/**'
      - '.github/workflows/sdk-tests.yml'

  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  DOTNET_VERSION: '8.0.x'
  PYTHON_VERSION: '3.12'
  GO_VERSION: '1.23'
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # Checkout code
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Setup Node.js (for schema generation)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Setup Rust (for building SDKs)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # Cache Rust dependencies
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache Python dependencies
      - name: Cache Python dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('**/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      # Cache Go modules
      - name: Cache Go modules
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}
          restore-keys: |
            ${{ runner.os }}-go-

      # Install Python build tools
      - name: Install Python build tools
        run: |
          python -m pip install --upgrade pip
          pip install uv maturin

      # Generate schemas (required for SDK builds)
      - name: Generate schemas
        run: npm run schemas
        working-directory: .

      # Build Python SDK (local-build mode)
      - name: Build Python SDK
        if: ${{ github.event.inputs.sdk_source != 'published-package' }}
        run: |
          cd languages/python
          uv venv .venv --python ${{ env.PYTHON_VERSION }}
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            .venv\Scripts\activate
          else
            source .venv/bin/activate
          fi
          uv pip install .[dev]
          maturin develop
        shell: bash

      # Build Go SDK (local-build mode)
      - name: Build Go SDK
        if: ${{ github.event.inputs.sdk_source != 'published-package' }}
        run: |
          # Build C library
          cargo build -p bitwarden-c

          # Create lib directories
          mkdir -p languages/go/internal/cinterface/lib

          # Setup platform-specific library
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            mkdir -p languages/go/internal/cinterface/lib/windows-x64
            cp target/debug/bitwarden_c.dll languages/go/internal/cinterface/lib/windows-x64/
          elif [[ "$RUNNER_OS" == "macOS" ]]; then
            if [[ "$(uname -m)" == "arm64" ]]; then
              mkdir -p languages/go/internal/cinterface/lib/darwin-arm64
              cp target/debug/libbitwarden_c.a languages/go/internal/cinterface/lib/darwin-arm64/
            else
              mkdir -p languages/go/internal/cinterface/lib/darwin-x64
              cp target/debug/libbitwarden_c.a languages/go/internal/cinterface/lib/darwin-x64/
            fi
          else
            mkdir -p languages/go/internal/cinterface/lib/linux-x64
            cp target/debug/libbitwarden_c.a languages/go/internal/cinterface/lib/linux-x64/
          fi
        shell: bash

      # Start fake-server (if in fake-server mode)
      - name: Start fake-server
        if: ${{ github.event.inputs.test_mode != 'real-server' }}
        run: |
          cargo build -p fake-server
          nohup cargo run -p fake-server > fake-server.log 2>&1 &
          echo $! > fake-server.pid

          # Wait for server to start
          for i in {1..30}; do
            if curl -s http://localhost:4000/health > /dev/null; then
              echo "Fake server is running"
              break
            fi
            echo "Waiting for fake server to start... ($i/30)"
            sleep 2
          done
        shell: bash

      # Create .env file from secrets in SDKTestFramework location
      - name: Setup environment variables
        run: |
          mkdir -p tests/SdkTestFramework.Tests/Configuration
          cat > tests/SdkTestFramework.Tests/Configuration/.env << EOF
          ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN || 'test-token-123' }}
          ORGANIZATION_ID=${{ secrets.ORGANIZATION_ID || 'test-org-123' }}
          API_URL=${{ github.event.inputs.test_mode == 'real-server' && secrets.API_URL || 'http://localhost:4000' }}
          IDENTITY_URL=${{ github.event.inputs.test_mode == 'real-server' && secrets.IDENTITY_URL || 'http://localhost:33656' }}
          STATE_FILE=${{ runner.temp }}/sdk-state.json
          TEST_MODE=${{ github.event.inputs.test_mode || 'fake-server' }}
          EOF

          # Platform-specific environment variables
          if [[ "$RUNNER_OS" == "macOS" ]]; then
            echo "DYLD_LIBRARY_PATH=${{ github.workspace }}/target/debug" >> tests/SdkTestFramework.Tests/Configuration/.env
            echo "OBJC_DISABLE_INITIALIZE_FORK_SAFETY=YES" >> tests/SdkTestFramework.Tests/Configuration/.env
          fi
        shell: bash

      # Update test-config.json with runtime values
      - name: Update test configuration
        run: |
          cd tests
          if [[ -f test-config.json ]]; then
            # Update TEST_MODE and SDK_SOURCE if provided
            if [[ -n "${{ github.event.inputs.test_mode }}" ]]; then
              jq '.configuration.TEST_MODE = "${{ github.event.inputs.test_mode }}"' test-config.json > temp.json && mv temp.json test-config.json
            fi
            if [[ -n "${{ github.event.inputs.sdk_source }}" ]]; then
              jq '.configuration.SDK_SOURCE = "${{ github.event.inputs.sdk_source }}"' test-config.json > temp.json && mv temp.json test-config.json
            fi
          fi
        shell: bash

      # Restore .NET dependencies
      - name: Restore .NET dependencies
        run: |
          dotnet restore tests/SdkTestFramework/SdkTestFramework.csproj
          dotnet restore tests/SdkTests/SdkTests.csproj

      # Build test framework
      - name: Build test framework
        run: |
          dotnet build tests/SdkTestFramework/SdkTestFramework.csproj --configuration Release
          dotnet build tests/SdkTests/SdkTests.csproj --configuration Release

      # Run tests
      - name: Run SDK tests
        run: |
          cd tests/SdkTests
          dotnet test --configuration Release --logger "console;verbosity=detailed" --logger "trx;LogFileName=test-results.trx"
        continue-on-error: true

      # Stop fake-server
      - name: Stop fake-server
        if: ${{ github.event.inputs.test_mode != 'real-server' && always() }}
        run: |
          if [[ -f fake-server.pid ]]; then
            kill $(cat fake-server.pid) || true
            rm fake-server.pid
          fi
        shell: bash

      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            tests/SdkTests/bin/Release/net8.0/test-results/
            tests/SdkTests/TestResults/
            fake-server.log
          retention-days: 30

      # Upload test report
      - name: Upload test report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-report-${{ matrix.os }}
          path: |
            tests/SdkTests/bin/Release/net8.0/test-report-*.json
            test-results/latest.json
          retention-days: 30

      # Test Report Summary (for PR comments)
      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results for ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [[ -f tests/SdkTests/bin/Release/net8.0/test-results/latest.json ]]; then
            # Parse JSON and create markdown summary
            python -c "
          import json
          import sys

          with open('tests/SdkTests/bin/Release/net8.0/test-results/latest.json', 'r') as f:
              report = json.load(f)

          summary = report.get('summary', {})
          print(f\"- **Total Operations**: {summary.get('totalOperations', 0)}\")
          print(f\"- **Passed**: {summary.get('passedOperations', 0)}\")
          print(f\"- **Failed**: {summary.get('failedOperations', 0)}\")
          print(f\"- **Success Rate**: {summary.get('successRate', 0):.1f}%\")
          print(f\"- **Status**: {'✅ PASSED' if summary.get('allPassed', False) else '❌ FAILED'}\")
          " >> $GITHUB_STEP_SUMMARY
          else
            echo "No test results found" >> $GITHUB_STEP_SUMMARY
          fi
        shell: bash
        continue-on-error: true

  # Aggregate results from all platforms
  summary:
    name: Test Summary
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate combined summary
        run: |
          echo "# SDK Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "## Platform Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          for os in ubuntu-latest macos-latest windows-latest; do
            echo "### $os" >> $GITHUB_STEP_SUMMARY
            if [[ -d "artifacts/test-results-$os" ]]; then
              echo "✅ Tests completed" >> $GITHUB_STEP_SUMMARY
            else
              echo "❌ Tests failed or did not run" >> $GITHUB_STEP_SUMMARY
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "## Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Test Mode: ${{ github.event.inputs.test_mode || 'fake-server' }}" >> $GITHUB_STEP_SUMMARY
          echo "- SDK Source: ${{ github.event.inputs.sdk_source || 'local-build' }}" >> $GITHUB_STEP_SUMMARY
        shell: bash