name: Publish Rust crates
run-name: Publish Rust crates ${{ inputs.release_type }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Options"
        required: true
        default: "Initial Release"
        type: choice
        options:
          - Initial Release
          - Redeploy
          - Dry Run
      version:
        description: "Version to publish (default: latest rust crates release)"
        required: true
        type: string
        default: latest

permissions: {}

concurrency:
  group: publish-rust-crates
  cancel-in-progress: false

jobs:
  setup:
    name: Setup
    runs-on: ubuntu-24.04
    permissions:
      contents: read
    outputs:
      release_version: ${{ steps.version-output.outputs.version }}
      release_tag: ${{ steps.version-output.outputs.tag_name }}
    steps:
      - name: Branch check
        if: ${{ inputs.release_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "==================================="
            echo "[!] Can only release from the 'main' branch"
            echo "==================================="
            exit 1
          fi

      - name: Version output
        id: version-output
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          if [[ "$INPUT_VERSION" == "latest" || "$INPUT_VERSION" == "" ]]; then
            TAG_NAME=$(gh release list --repo bitwarden/sdk-sm --limit 100 --order desc \
              --json tagName --jq '[.[].tagName | select(startswith("rust-v"))][0]')
            if [[ -z "$TAG_NAME" || "$TAG_NAME" == "null" ]]; then
              echo "::error::No rust-v* release found on bitwarden/sdk-sm"
              exit 1
            fi
            VERSION="${TAG_NAME#rust-v}"
          else
            VERSION="${INPUT_VERSION#rust-v}"
            VERSION="${VERSION#v}"
            TAG_NAME="rust-v${VERSION}"
          fi
          echo "Resolved version: $VERSION"
          echo "Resolved tag: $TAG_NAME"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag_name=$TAG_NAME" >> "$GITHUB_OUTPUT"

  publish:
    name: Publish
    runs-on: ubuntu-24.04
    needs: setup
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout sdk-sm
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          repository: bitwarden/sdk-sm
          ref: ${{ needs.setup.outputs.release_tag }}
          persist-credentials: false

      - name: Log in to Azure
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Retrieve crates.io token
        id: retrieve-cratesio
        uses: bitwarden/gh-actions/get-keyvault-secrets@main
        with:
          keyvault: gh-deploy
          secrets: "cratesio-api-token"

      - name: Retrieve deploy app credentials
        id: retrieve-deploy-app
        uses: bitwarden/gh-actions/get-keyvault-secrets@main
        with:
          keyvault: gh-deploy
          secrets: "gh-app-bre-deploy-id,gh-app-bre-deploy-key"

      - name: Log out from Azure
        uses: bitwarden/gh-actions/azure-logout@main

      - name: Generate sdk-sm deployments token
        id: app-token
        uses: actions/create-github-app-token@f8d387b68d61c58ab83c6c016672934102569859 # v3.0.0
        with:
          app-id: ${{ steps.retrieve-deploy-app.outputs.gh-app-bre-deploy-id }}
          private-key: ${{ steps.retrieve-deploy-app.outputs.gh-app-bre-deploy-key }}
          owner: bitwarden
          repositories: sdk-sm
          permission-deployments: write

      - name: Install rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Install cargo-release
        run: cargo install cargo-release --version 0.25.20 --locked

      - name: Create deployment on sdk-sm
        if: ${{ inputs.release_type != 'Dry Run' }}
        id: deployment
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          DEPLOYMENT_REF: ${{ needs.setup.outputs.release_tag }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const { data } = await github.rest.repos.createDeployment({
              owner: 'bitwarden',
              repo: 'sdk-sm',
              ref: process.env.DEPLOYMENT_REF,
              environment: 'Bitwarden SDK',
              description: `Deployment from ${process.env.DEPLOYMENT_REF}`,
              task: 'release',
              auto_merge: false,
              required_contexts: [],
            });
            await github.rest.repos.createDeploymentStatus({
              owner: 'bitwarden',
              repo: 'sdk-sm',
              deployment_id: data.id,
              state: 'in_progress',
              log_url: logUrl,
            });
            core.setOutput('deployment_id', data.id);

      - name: Cargo release
        if: ${{ inputs.release_type != 'Dry Run' }}
        env:
          PUBLISH_GRACE_SLEEP: 10
          CARGO_REGISTRY_TOKEN: ${{ steps.retrieve-cratesio.outputs.cratesio-api-token }}
        run: cargo-release release publish --exclude bws --execute --no-confirm --allow-branch '*'

      - name: Update deployment status to Success
        if: ${{ inputs.release_type != 'Dry Run' && success() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner: 'bitwarden',
              repo: 'sdk-sm',
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'success',
              log_url: logUrl,
            });

      - name: Update deployment status to Failure
        if: ${{ inputs.release_type != 'Dry Run' && failure() }}
        uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
        env:
          DEPLOYMENT_ID: ${{ steps.deployment.outputs.deployment_id }}
        with:
          github-token: ${{ steps.app-token.outputs.token }}
          script: |
            const logUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            await github.rest.repos.createDeploymentStatus({
              owner: 'bitwarden',
              repo: 'sdk-sm',
              deployment_id: Number(process.env.DEPLOYMENT_ID),
              state: 'failure',
              log_url: logUrl,
            });