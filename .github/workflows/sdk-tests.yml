name: SDK Integration Tests

# This workflow runs SDK integration tests using the .NET SdkTestFramework
# It supports multiple languages, platforms, and test configurations

on:
  workflow_dispatch:
    inputs:
      test_mode:
        description: 'Test execution mode'
        required: true
        default: 'fake-server'
        type: choice
        options:
          - fake-server
          - real-server
      verbose:
        description: 'Enable verbose output'
        required: false
        default: false
        type: boolean
      no_build:
        description: 'Skip SDK builds (use existing builds)'
        required: false
        default: false
        type: boolean

  push:
    branches:
      - main
      - 'test/**'
      - 'QA-*/**'
    paths:
      - 'languages/**'
      - 'tests/**'
      - 'crates/**'
      - '.github/workflows/sdk-tests.yml'

  pull_request:
    branches:
      - main
    paths:
      - 'languages/**'
      - 'tests/**'
      - 'crates/**'
      - '.github/workflows/sdk-tests.yml'

  schedule:
    # Run daily at 2 AM UTC
    - cron: '0 2 * * *'

env:
  DOTNET_VERSION: '10.0.x'
  PYTHON_VERSION: '3.12'
  GO_VERSION: '1.23'
  NODE_VERSION: '20'
  RUST_VERSION: 'stable'

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}

    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      # Checkout repository
      - name: Checkout repository
        uses: actions/checkout@v4

      # Setup .NET
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      # Setup Python
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      # Setup Go
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      # Setup Node.js (for schema generation)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      # Setup Rust (for building SDKs)
      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_VERSION }}

      # Cache Rust dependencies
      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      # Cache .NET dependencies
      - name: Cache .NET dependencies
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: ${{ runner.os }}-nuget-${{ hashFiles('**/*.csproj') }}
          restore-keys: |
            ${{ runner.os }}-nuget-

      # Install Python build tools
      - name: Install Python build tools
        if: ${{ !github.event.inputs.no_build }}
        run: |
          python -m pip install --upgrade pip
          pip install maturin

      # Install npm dependencies and generate schemas
      - name: Generate schemas
        if: ${{ !github.event.inputs.no_build }}
        run: |
          npm ci
          npm run schemas

      # Build test framework
      - name: Build test framework
        run: |
          cd tests
          dotnet restore
          dotnet build --configuration Release

      # Start fake-server (if in fake-server mode)
      - name: Start fake-server
        if: ${{ github.event.inputs.test_mode != 'real-server' }}
        run: |
          cargo build -p fake-server --release
          nohup cargo run -p fake-server --release > fake-server.log 2>&1 &
          echo $! > fake-server.pid

          # Wait for server to start
          for i in {1..30}; do
            if curl -s http://localhost:4000/health > /dev/null 2>&1; then
              echo "Fake server is running"
              break
            fi
            echo "Waiting for fake server to start... ($i/30)"
            sleep 2
          done
        shell: bash

      # Setup environment variables
      - name: Setup environment variables
        run: |
          # Create .env file for test configuration
          cat > tests/.env << EOF
          ACCESS_TOKEN=${{ secrets.ACCESS_TOKEN || 'test-token' }}
          ORGANIZATION_ID=${{ secrets.ORGANIZATION_ID || 'test-org-id' }}
          API_URL=${{ github.event.inputs.test_mode == 'real-server' && secrets.API_URL || 'http://localhost:4000/api' }}
          IDENTITY_URL=${{ github.event.inputs.test_mode == 'real-server' && secrets.IDENTITY_URL || 'http://localhost:4000/identity' }}
          STATE_FILE=${{ runner.temp }}/sdk-state.json
          TEST_MODE=${{ github.event.inputs.test_mode || 'fake-server' }}
          NO_BUILD=${{ github.event.inputs.no_build || 'false' }}
          VERBOSE=${{ github.event.inputs.verbose || 'false' }}
          EOF
        shell: bash

      # Run tests
      - name: Run SDK tests
        run: |
          cd tests
          dotnet test --configuration Release \
            --logger "console;verbosity=${{ github.event.inputs.verbose && 'detailed' || 'normal' }}" \
            --logger "trx;LogFileName=test-results.trx" \
            --logger "json;LogFileName=test-results.json" \
            --results-directory TestResults
        env:
          TEST_MODE: ${{ github.event.inputs.test_mode || 'fake-server' }}
          NO_BUILD: ${{ github.event.inputs.no_build || 'false' }}
        continue-on-error: true

      # Stop fake-server
      - name: Stop fake-server
        if: ${{ github.event.inputs.test_mode != 'real-server' && always() }}
        run: |
          if [[ -f fake-server.pid ]]; then
            kill $(cat fake-server.pid) || true
            rm fake-server.pid
          fi
        shell: bash

      # Upload test results
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: |
            tests/TestResults/
            fake-server.log
          retention-days: 30

      # Generate test summary
      - name: Generate test summary
        if: always()
        run: |
          echo "## Test Results for ${{ matrix.os }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          # Parse JSON test results if available
          if [[ -f tests/TestResults/test-results.json ]]; then
            echo "### Test Summary" >> $GITHUB_STEP_SUMMARY
            # Extract key metrics from JSON (this can be enhanced with jq)
            cat tests/TestResults/test-results.json | jq -r '
              "- Total Tests: \(.summary.total)",
              "- Passed: \(.summary.passed)",
              "- Failed: \(.summary.failed)",
              "- Skipped: \(.summary.skipped)",
              "- Duration: \(.summary.duration)ms"
            ' >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "Unable to parse test results" >> $GITHUB_STEP_SUMMARY
          else
            echo "No test results found" >> $GITHUB_STEP_SUMMARY
          fi

          echo "" >> $GITHUB_STEP_SUMMARY
          echo "### Configuration" >> $GITHUB_STEP_SUMMARY
          echo "- Test Mode: ${{ github.event.inputs.test_mode || 'fake-server' }}" >> $GITHUB_STEP_SUMMARY
          echo "- No Build: ${{ github.event.inputs.no_build || 'false' }}" >> $GITHUB_STEP_SUMMARY
        shell: bash
        continue-on-error: true

  # Aggregate results from all platforms
  summary:
    name: Test Summary
    needs: test
    runs-on: ubuntu-latest
    if: always()

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Generate combined summary
        run: |
          echo "# SDK Integration Test Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          echo "## Platform Results" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          SUCCESS=0
          FAILURE=0

          for os in ubuntu-latest macos-latest windows-latest; do
            echo "### $os" >> $GITHUB_STEP_SUMMARY
            if [[ -d "artifacts/test-results-$os" ]]; then
              if [[ -f "artifacts/test-results-$os/test-results.json" ]]; then
                echo "✅ Tests completed" >> $GITHUB_STEP_SUMMARY
                SUCCESS=$((SUCCESS + 1))
              else
                echo "⚠️ Tests completed with issues" >> $GITHUB_STEP_SUMMARY
              fi
            else
              echo "❌ Tests failed or did not run" >> $GITHUB_STEP_SUMMARY
              FAILURE=$((FAILURE + 1))
            fi
            echo "" >> $GITHUB_STEP_SUMMARY
          done

          echo "## Overall Status" >> $GITHUB_STEP_SUMMARY
          if [[ $FAILURE -eq 0 ]]; then
            echo "✅ All platforms passed" >> $GITHUB_STEP_SUMMARY
          elif [[ $SUCCESS -gt 0 ]]; then
            echo "⚠️ Some platforms failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          else
            echo "❌ All platforms failed" >> $GITHUB_STEP_SUMMARY
            exit 1
          fi
        shell: bash