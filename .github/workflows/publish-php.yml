name: Publish PHP SDK
run-name: Publish PHP SDK ${{ inputs.release_type }}

on:
  workflow_dispatch:
    inputs:
      release_type:
        description: "Release Options"
        required: true
        default: "Release"
        type: choice
        options:
          - Release
          - Dry Run

env:
  _KEY_VAULT: "bitwarden-ci"

jobs:
  validate:
    name: Setup
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Checkout repo
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Branch check
        if: ${{ inputs.release_type != 'Dry Run' }}
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "==================================="
            echo "[!] Can only release from the 'main' branch"
            echo "==================================="
            exit 1
          fi

      - name: Get version
        id: version
        run: |
          VERSION=$(cat languages/php/composer.json | grep -Eo '"version": "[0-9]+\.[0-9]+\.[0-9]+"' | grep -Eo '[0-9]+\.[0-9]+\.[0-9]+')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  setup-php:
    name: Setup PHP
    runs-on: ubuntu-22.04
    permissions:
      contents: read
    steps:
      - name: Checkout Repository
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          persist-credentials: false

      - name: Setup PHP with PECL extension
        uses: shivammathur/setup-php@44454db4f0199b8b9685a5d763dc37cbf79108e1 # 2.36.0
        with:
          php-version: "8.0"
          tools: composer
          extensions: ext-ffi

      - name: Composer check
        run: |
          composer update
          composer install
          composer validate
        working-directory: languages/php/

  repo-sync:
    name: Push changed files to SDK PHP repo
    runs-on: ubuntu-22.04
    needs:
      - validate
      - setup-php
    permissions:
      contents: read
      id-token: write
    env:
      _BOT_NAME: "bw-ghapp[bot]"
      _BOT_EMAIL: "178206702+bw-ghapp[bot]@users.noreply.github.com"
      _PKG_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Checkout SDK repo
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          path: sdk
          persist-credentials: false

      - name: Log in to Azure
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Retrieve secrets
        id: retrieve-secret
        uses: bitwarden/gh-actions/get-keyvault-secrets@main
        with:
          keyvault: gh-org-bitwarden
          secrets: "BW-GHAPP-ID,BW-GHAPP-KEY"

      - name: Log out from Azure
        uses: bitwarden/gh-actions/azure-logout@main

      - name: Generate GH App token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ steps.retrieve-secret.outputs.BW-GHAPP-ID }}
          private-key: ${{ steps.retrieve-secret.outputs.BW-GHAPP-KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout SDK-PHP repo
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: bitwarden/sm-sdk-php
          path: sm-sdk-php
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: false

      - name: Setup Git
        working-directory: sm-sdk-php
        run: |
          git config --local user.email "${{ env._BOT_EMAIL }}"
          git config --local user.name "${{ env._BOT_NAME }}"

      - name: Update files
        run: |
          # Copy files to local sm-sdk-php repo path
          cp --verbose -rf sdk/languages/php/. sm-sdk-php

      - name: Replace repo name
        working-directory: sm-sdk-php
        run: |
          find . -name '*' -exec \
            sed -i -e 's/github.com\/bitwarden\/sdk\/languages\/php/github.com\/bitwarden\/sm-sdk-php/g' {} \;

          find . -name '*' -exec \
            sed -i -e 's/github.com\/bitwarden\/sdk/github.com\/bitwarden\/sm-sdk-php/g' {} \;

      - name: Push changes
        working-directory: sm-sdk-php
        run: |
          git add .

          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Update PHP SDK to ${{ github.sha }}"
          else
            echo "No changes to commit"
          fi

          if [[ "${{ inputs.release_type }}" == "Dry Run" ]]; then
            echo "==================================="
            echo "[!] Dry Run - Skipping push"
            echo "==================================="
            git ls-files -m
            exit 0
          else
            git push origin main
          fi

      - name: Create release tag on PHP SDK repo
        if: ${{ inputs.release_type != 'Dry Run' }}
        working-directory: sm-sdk-php
        run: |
          # Check if tag exists, set output then exit 0 if true.
          if git log "v${_PKG_VERSION}" >/dev/null 2>&1; then
            echo "==================================="
            echo "[!] Tag v${_PKG_VERSION} already exists"
            echo "==================================="
            exit 1
          fi

          git tag "v${_PKG_VERSION}"
          git push origin "v${_PKG_VERSION}"

  github-release:
    name: GitHub Release
    runs-on: ubuntu-22.04
    permissions:
      contents: read
      id-token: write
    needs:
      - setup-php
      - repo-sync
      - validate
    env:
      _PKG_VERSION: ${{ needs.validate.outputs.version }}
    steps:
      - name: Log in to Azure
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Retrieve secrets
        id: retrieve-secret
        uses: bitwarden/gh-actions/get-keyvault-secrets@main
        with:
          keyvault: gh-org-bitwarden
          secrets: "BW-GHAPP-ID,BW-GHAPP-KEY"

      - name: Log out from Azure
        uses: bitwarden/gh-actions/azure-logout@main

      - name: Generate GH App token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ steps.retrieve-secret.outputs.BW-GHAPP-ID }}
          private-key: ${{ steps.retrieve-secret.outputs.BW-GHAPP-KEY }}
          owner: ${{ github.repository_owner }}

      - name: Download x86_64-apple-darwin artifact
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          workflow: build-rust-cross-platform.yml
          workflow_conclusion: success
          branch: main
          artifacts: libbitwarden_c_files-x86_64-apple-darwin
          skip_unpack: true

      - name: Download aarch64-apple-darwin artifact
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          workflow: build-rust-cross-platform.yml
          workflow_conclusion: success
          branch: main
          artifacts: libbitwarden_c_files-aarch64-apple-darwin
          skip_unpack: true

      - name: Download x86_64-unknown-linux-gnu artifact
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          workflow: build-rust-cross-platform.yml
          workflow_conclusion: success
          branch: main
          artifacts: libbitwarden_c_files-x86_64-unknown-linux-gnu
          skip_unpack: true

      - name: Download x86_64-pc-windows-msvc artifact
        uses: bitwarden/gh-actions/download-artifacts@main
        with:
          workflow: build-rust-cross-platform.yml
          workflow_conclusion: success
          branch: main
          artifacts: libbitwarden_c_files-x86_64-pc-windows-msvc
          skip_unpack: true

      - name: Rename build artifacts
        run: |
          mv libbitwarden_c_files-x86_64-apple-darwin.zip "libbitwarden_c_files-x86_64-apple-darwin-$_PKG_VERSION.zip"
          mv libbitwarden_c_files-aarch64-apple-darwin.zip "libbitwarden_c_files-aarch64-apple-darwin-$_PKG_VERSION.zip"
          mv libbitwarden_c_files-x86_64-unknown-linux-gnu.zip "libbitwarden_c_files-x86_64-unknown-linux-gnu-$_PKG_VERSION.zip"
          mv libbitwarden_c_files-x86_64-pc-windows-msvc.zip "libbitwarden_c_files-x86_64-pc-windows-msvc-$_PKG_VERSION.zip"

      - name: Create release
        if: ${{ inputs.release_type != 'Dry Run' }}
        uses: ncipollo/release-action@b7eabc95ff50cbeeedec83973935c8f306dfcd0b # v1.20.0
        with:
          tag: v${{ env._PKG_VERSION }}
          name: v${{ env._PKG_VERSION }}
          body: "<insert release notes here>"
          token: ${{ steps.app-token.outputs.token }}
          draft: true
          repo: sm-sdk-php
          owner: bitwarden
          artifacts: "libbitwarden_c_files-x86_64-apple-darwin-${{ env._PKG_VERSION }}.zip,
            libbitwarden_c_files-aarch64-apple-darwin-${{ env._PKG_VERSION }}.zip,
            libbitwarden_c_files-x86_64-unknown-linux-gnu-${{ env._PKG_VERSION }}.zip,
            libbitwarden_c_files-x86_64-pc-windows-msvc-${{ env._PKG_VERSION }}.zip"

  packagist-publish:
    name: Publish to Packagist
    runs-on: ubuntu-22.04
    needs:
      - validate
      - setup-php
      - repo-sync
      - github-release
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Log in to Azure
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Retrieve packagist secrets
        id: retrieve-packagist
        uses: bitwarden/gh-actions/get-keyvault-secrets@main
        with:
          keyvault: ${{ env._KEY_VAULT }}
          secrets: "packagist-key"

      - name: Retrieve ghapp secrets
        id: retrieve-secret
        uses: bitwarden/gh-actions/get-keyvault-secrets@main
        with:
          keyvault: gh-org-bitwarden
          secrets: "BW-GHAPP-ID,BW-GHAPP-KEY"

      - name: Log out from Azure
        uses: bitwarden/gh-actions/azure-logout@main

      - name: Generate GH App token
        uses: actions/create-github-app-token@29824e69f54612133e76f7eaac726eef6c875baf # v2.2.1
        id: app-token
        with:
          app-id: ${{ steps.retrieve-secret.outputs.BW-GHAPP-ID }}
          private-key: ${{ steps.retrieve-secret.outputs.BW-GHAPP-KEY }}
          owner: ${{ github.repository_owner }}

      - name: Checkout SDK-PHP repo
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          repository: bitwarden/sm-sdk-php
          path: sm-sdk-php
          ref: main
          token: ${{ steps.app-token.outputs.token }}
          persist-credentials: true

      - name: Publish version
        if: ${{ inputs.release_type != 'Dry Run' }}
        env:
          PACKAGIST_KEY: ${{ steps.retrieve-packagist.outputs.packagist-key }}
        run: curl -XPOST -H'content-type:application/json' "https://packagist.org/api/update-package?username=bitwarden&apiToken=${PACKAGIST_KEY}" -d'{"repository":{"url":"https://packagist.org/packages/bitwarden/sdk-secrets"}}'
        working-directory: sm-sdk-php
