name: Version Bump
run-name: Version Bump - ${{ inputs.project }} - v${{ inputs.version_number }}

on:
  workflow_dispatch:
    inputs:
      project:
        description: "Project"
        required: true
        type: choice
        options:
          - bitwarden
          - bws
          - napi
          - python-sdk
          - ruby-sdk
          - go-sdk
          - dotnet-sdk
          - php-sdk
          - java-sdk
          - cpp-sdk
      version_number:
        description: "New version (example: '2024.1.0')"
        required: true

jobs:
  bump_version:
    name: "Bump ${{ inputs.project }} Version to v${{ inputs.version_number }}"
    runs-on: ubuntu-24.04
    permissions:
      contents: write
      pull-requests: write
      id-token: write
      actions: read
    env:
      _VERSION: ${{ inputs.version_number }}
      _PROJECT: ${{ inputs.project }}
    steps:
      - name: Install rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: stable

      - name: Cache cargo registry
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Install cargo-release
        run: cargo install cargo-edit --locked

      - name: Log in to Azure
        uses: bitwarden/gh-actions/azure-login@main
        with:
          subscription_id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          tenant_id: ${{ secrets.AZURE_TENANT_ID }}
          client_id: ${{ secrets.AZURE_CLIENT_ID }}

      - name: Checkout Branch
        uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6.0.1
        with:
          ref: main
          persist-credentials: true
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Version Branch
        id: create-branch
        run: |
          NAME="version_bump_${GITHUB_REF_NAME}_${_PROJECT}_${_VERSION}"
          git switch -c "$NAME"
          git push -u origin "$NAME"
          echo "name=$NAME" >> "$GITHUB_OUTPUT"

      ########################
      # VERSION BUMP SECTION #
      ########################

      ### napi
      - name: Bump @bitwarden/sdk-napi Version
        if: ${{ inputs.project == 'napi' }}
        working-directory: "crates/bitwarden-napi"
        run: |
          npm ci
          npm version "${_VERSION}"

      - name: Bump napi crate Version
        if: ${{ inputs.project == 'napi' }}
        run: cargo set-version -p bitwarden-napi "${_VERSION}"

      ### bitwarden
      - name: Bump bitwarden crate Version
        if: ${{ inputs.project == 'bitwarden' }}
        run: cargo set-version -p bitwarden "${_VERSION}"

      ### bws
      - name: Bump bws Version
        if: ${{ inputs.project == 'bws' }}
        run: |
          cargo set-version -p bws "${_VERSION}"
          # bump the version in install.sh
          sed -i "s/DEFAULT_BWS_VERSION=\"[0-9]\+\.[0-9]\+\.[0-9]\+\"/DEFAULT_BWS_VERSION=\"${_VERSION}\"/" ./crates/bws/scripts/install.sh
          # bump the version in install.ps1
          sed -i "s/\$defaultBwsVersion = \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\$defaultBwsVersion = \"${_VERSION}\"/" ./crates/bws/scripts/install.ps1

      ### python
      - name: Bump python-sdk Version
        if: ${{ inputs.project == 'python-sdk' }}
        run: |
          cargo set-version -p bitwarden-py "${_VERSION}"
          sed -i "s/__version__ = \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/__version__ = \"${_VERSION}\"/" ./languages/python/bitwarden_sdk/__init__.py

      ### ruby sdk
      - name: Bump ruby-sdk Version
        if: ${{ inputs.project == 'ruby-sdk' }}
        run: sed -i "s/VERSION = '[0-9]\+\.[0-9]\+\.[0-9]\+'/VERSION = '${_VERSION}'/" ./languages/ruby/bitwarden_sdk_secrets/lib/version.rb

      ### go sdk
      - name: Bump go-sdk Version
        if: ${{ inputs.project == 'go-sdk' }}
        run: |
          # Extract current and new major versions
          CURRENT_VERSION=$(cat ./languages/go/.version | grep -Eo "[0-9]+\.[0-9]+\.[0-9]+")
          CURRENT_MAJOR=$(echo "$CURRENT_VERSION" | cut -d. -f1)
          NEW_MAJOR=$(echo "${_VERSION}" | cut -d. -f1)

          echo "Current version: $CURRENT_VERSION (major: $CURRENT_MAJOR)"
          echo "New version: ${_VERSION} (major: $NEW_MAJOR)"

          # Check if this is a major version bump
          if [ "$CURRENT_MAJOR" != "$NEW_MAJOR" ]; then
            echo "Major version bump detected: v$CURRENT_MAJOR -> v$NEW_MAJOR"

            # Special handling for v0/v1 -> v2+ transition (Go modules v0 and v1 don't use version suffix)
            if ([ "$CURRENT_MAJOR" = "0" ] || [ "$CURRENT_MAJOR" = "1" ]) && [ "$NEW_MAJOR" -ge "2" ]; then
              echo "Transitioning from v${CURRENT_MAJOR} (no suffix) to v${NEW_MAJOR} (with suffix)"

              # Update all .go, .mod, and .md files
              find ./languages/go -type f \( -name "*.go" -o -name "*.mod" -o -name "*.md" \) \
                -exec sed -i -e "s|github\.com/bitwarden/sdk-go/|github.com/bitwarden/sdk-go/v${NEW_MAJOR}/|g" \
                             -e "s|github\.com/bitwarden/sdk-go$|github.com/bitwarden/sdk-go/v${NEW_MAJOR}|g" \
                             -e "s|github\.com/bitwarden/sdk-go\([^/]\)|github.com/bitwarden/sdk-go/v${NEW_MAJOR}\1|g" {} +
            else
              # Standard case: v2+ -> v3+
              echo "Updating version suffix from v${CURRENT_MAJOR} to v${NEW_MAJOR}"

              # Update all .go, .mod, and .md files
              find ./languages/go -type f \( -name "*.go" -o -name "*.mod" -o -name "*.md" \) \
                -exec sed -i "s|github\.com/bitwarden/sdk-go/v${CURRENT_MAJOR}|github.com/bitwarden/sdk-go/v${NEW_MAJOR}|g" {} +
            fi

            # Special handling for example/go.mod: update version number in require statement
            echo "Updating version number in example/go.mod require statement"
            sed -i "s|\(github\.com/bitwarden/sdk-go[^[:space:]]*\) v[0-9]\+\.[0-9]\+\.[0-9]\+\(.*\)|\1 v${_VERSION}\2|g" ./languages/go/example/go.mod
          fi

          # Always update the version file (for major, minor, and patch bumps)
          sed -i "s/[0-9]\+\.[0-9]\+\.[0-9]\+/${_VERSION}/" ./languages/go/.version

      ### dotnet sdk
      - name: Bump dotnet-sdk Version
        if: ${{ inputs.project == 'dotnet-sdk' }}
        run: sed -i "s/<Version>[0-9]\+\.[0-9]\+\.[0-9]\+<\/Version>/<Version>${_VERSION}<\/Version>/" languages/csharp/Bitwarden.Sdk/Bitwarden.Sdk.csproj

      ### php sdk
      - name: Bump php-sdk Version
        if: ${{ inputs.project == 'php-sdk' }}
        run: |
          sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"${_VERSION}\"/" ./languages/php/composer.json

      ### java sdk
      - name: Bump java-sdk Version
        if: ${{ inputs.project == 'java-sdk' }}
        run: |
          sed -i "s/version = \"[0-9]\+\.[0-9]\+\.[0-9]\+"/version = \"${_VERSION}\"/" ./languages/java/build.gradle

      ### cpp sdk
      - name: Bump C++ SDK Version
        if: ${{ inputs.project == 'cpp-sdk' }}
        run: |
          sed -i "s/\"version\": \"[0-9]\+\.[0-9]\+\.[0-9]\+\"/\"version\": \"${_VERSION}\"/" ./languages/cpp/vcpkg.json

      ############################
      # VERSION BUMP SECTION END #
      ############################

      - name: Check if version changed
        id: version-changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "changes_to_commit=TRUE" >> "$GITHUB_OUTPUT"
          else
            echo "changes_to_commit=FALSE" >> "$GITHUB_OUTPUT"
            echo "No changes to commit!";
          fi

      - name: Run prettier
        if: ${{ steps.version-changed.outputs.changes_to_commit == 'TRUE' }}
        run: |
          npm ci
          npm run prettier

      - name: Commit files
        if: ${{ steps.version-changed.outputs.changes_to_commit == 'TRUE' }}
        env:
          BRANCH: ${{ steps.create-branch.outputs.name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git commit -m "Bumped sdk-${_PROJECT} version to ${_VERSION}"
          git push origin "${BRANCH}"

      - name: Create Version PR
        if: ${{ steps.version-changed.outputs.changes_to_commit == 'TRUE' }}
        id: create-pr
        env:
          GH_token: ${{ secrets.GITHUB_TOKEN }}
          PR_BRANCH: ${{ steps.create-branch.outputs.name }}
          TITLE: "Bump ${{ inputs.project }} version to ${{ inputs.version_number }}"
        run: |
          PR_URL=$(gh pr create --title "$TITLE" \
            --base "main" \
            --head "$PR_BRANCH" \
            --label "version update" \
            --label "automated pr" \
            --body "
              ## Type of change
              - [ ] Bug fix
              - [ ] New feature development
              - [ ] Tech debt (refactoring, code cleanup, dependency upgrades, etc)
              - [ ] Build/deploy pipeline (DevOps)
              - [X] Other

              ## Objective
              Automated ${_PROJECT} version bump to ${_VERSION}")
          echo "pr_number=${PR_URL##*/}" >> "$GITHUB_OUTPUT"
